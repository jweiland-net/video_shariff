name: Tests

on: [pull_request]

jobs:
  testing:
    name: Testing

    runs-on: ubuntu-latest

    strategy:
      fail-fast: true

      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      - name: 'Lint PHP'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s lint

      - name: 'Install testing system'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s composerUpdate

      - name: 'Composer validate'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s composerValidate

      - name: 'Composer normalize'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s composerNormalize -n

      - name: 'CGL'
        run: Build/Scripts/runTests.sh -n -p ${{ matrix.php }} -s cgl

      - name: 'Execute unit tests'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s unit

      - name: 'Execute functional tests (MySQL)'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -d mysql -s functional

      - name: 'Execute functional tests (MariaDB)'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -d mariadb -s functional

  frontend:
    name: 'Frontend build'

    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      - name: 'Setup Node.js'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: 'Install npm dependencies'
        run: npm ci

      - name: 'Verify VideoShariff.min.js is up to date'
        run: npm run verify:js
